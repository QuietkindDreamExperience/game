<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dream Journey - Quietkind</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#fffdfd;
}

.container{
  max-width:800px;
  margin:20px auto;
  padding:20px;
}

.box{
  background:white;
  border:2px dashed #ffb6c1;
  border-radius:20px;
  padding:20px;
  text-align:center;
}

h1{
  color:#db7093;
}

.screen{
  display:none;
}

.screen.active{
  display:block;
}

input, select{
  width:90%;
  padding:10px;
  margin:10px 0;
  border-radius:10px;
  border:2px solid #ffb6c1;
}

button{
  background:#db7093;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:25px;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  transform:translateY(-2px);
}

.card{
  border:2px dashed #ffb6c1;
  padding:12px;
  margin:10px 0;
  border-radius:12px;
  cursor:pointer;
}

.card:hover{
  border-color:#db7093;
}

.score{
  font-weight:bold;
  color:#db7093;
}
</style>
</head>

<body>

<div class="container">
<div class="box">

<h1>🌸 Dream Journey</h1>

<!-- SCREEN 1 -->
<div class="screen active" id="s1">
<h3>Step 1: Your Name</h3>
<input id="name" placeholder="Enter your name">
<button onclick="next1()">Next</button>
</div>

<!-- SCREEN 2 -->
<div class="screen" id="s2">
<h3>Step 2: Choose Country</h3>

<select id="origin">
<option>Thailand</option>
<option>Japan</option>
<option>USA</option>
<option>France</option>
</select>

<select id="target">
<option>Thailand</option>
<option>Japan</option>
<option>USA</option>
<option>France</option>
</select>

<button onclick="next2()">Next</button>
</div>

<!-- SCREEN 3 -->
<div class="screen" id="s3">
<h3>Step 3: Choose Dream</h3>

<div class="card" onclick="chooseDream('Healer')">🌸 Healer</div>
<div class="card" onclick="chooseDream('Educator')">📚 Educator</div>
<div class="card" onclick="chooseDream('Eco Warrior')">🌿 Eco Warrior</div>

</div>

<!-- SCREEN 4 -->
<div class="screen" id="s4">
<h3>🌍 Journey Hub</h3>

<p id="info"></p>

<p>❤️ Kindness: <span id="kind">0</span></p>

<button onclick="help()">Help Someone</button>
</div>

</div>
</div>

<script>
let game = {
  name:"",
  origin:"",
  target:"",
  dream:"",
  kindness:0
};

function next1(){
  game.name = document.getElementById("name").value;

  if(!game.name){
    alert("Please enter your name");
    return;
  }

  show(2);
}

function next2(){
  game.origin = document.getElementById("origin").value;
  game.target = document.getElementById("target").value;

  show(3);
}

function chooseDream(d){
  game.dream = d;

  document.getElementById("info").innerText =
    game.name + " chose " + game.dream + " path 🌍";

  show(4);
}

function help(){
  game.kindness += 10;
  document.getElementById("kind").innerText = game.kindness;
}

function show(n){
  document.querySelectorAll(".screen")
  .forEach(s => s.classList.remove("active"));

  document.getElementById("s"+n)
  .classList.add("active");
}
</script>

</body>
</html>
